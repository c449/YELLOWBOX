<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fff;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
  overflow: hidden;
  overscroll-behavior: none;
}

/* ── Square canvas ── */
#canvas {
  width: min(600px, 90vw);
  height: min(600px, 90vw);
  background: #000;
  border: 1px solid #000;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  touch-action: none;
}

/* ── User's photo (behind everything) ── */
#bg-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform-origin: center center;
  display: none;
  z-index: 1;
  user-select: none;
  -webkit-user-drag: none;
}

/* Click-to-upload hint (when no image loaded) */
#img-hint {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 60px;
  color: #FFE200;
  font: bold 12px/1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  letter-spacing: 0;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#canvas.has-image { border: none; }

/* Drag-over state */
#canvas.drag-over { border-color: #FFE200; }
#canvas.drag-over #img-hint { color: #FFE200; }

/* Grab cursor once image is loaded */
#canvas.has-image { cursor: grab; }
#canvas.has-image.dragging { cursor: grabbing; }

/* ── DG yellow box overlay (top of canvas) ──
   The PNG (dg-box.png) is a square image:
   yellow box in the top ~34%, black below.
   We show only the top 34% via overflow:hidden,
   letting the user's photo show below. */
#dg-box {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 34%;
  overflow: hidden;
  z-index: 2;
  pointer-events: none; /* pass mouse events through for dragging */
}

#dg-overlay {
  width: 100%;
  height: auto;  /* square PNG → renders at canvas-width tall */
  display: block;
}

/* ── Editable text inside the yellow area ──
   Positions relative to #dg-box height (34% of canvas).
   Yellow interior: approx y 13%–92% of box, x 5%–95%.       */
#text-overlay {
  position: absolute;
  top: calc(13% - 7px);
  bottom: calc(8% + 7px);
  left: 6%;
  right: 6%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  z-index: 3;
  pointer-events: auto;
  overflow: hidden;
}

.line-wrap {
  width: 100%;
  position: relative;
}

.pt-tag {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  font: bold 9px/1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  color: rgba(0,0,0,0.6);
  pointer-events: none;
  white-space: nowrap;
}

/* Bottom tab — 7-char field */
#tl-tab-wrap {
  position: absolute;
  bottom: calc(14% - 4px);
  left: 50%;
  transform: translateX(-50%);
  width: 20%;
  z-index: 3;
  pointer-events: auto;
}

#tl-tab {
  width: 100%;
  text-align: center;
  color: #000;
  outline: none;
  background: transparent;
  cursor: text;
  white-space: nowrap;
  overflow: hidden;
  font: bold clamp(7px, 1.3vw, 11px)/1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  text-transform: uppercase;
  letter-spacing: 0;
}

.textline {
  width: 100%;
  text-align: center;
  color: #000;
  outline: none;
  background: transparent;
  cursor: text;
  white-space: pre-wrap;
  word-break: break-word;
  overflow: hidden;
  pointer-events: auto;
  padding: 0 10px;
  text-transform: uppercase;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#tl1:empty::before { content: 'ADD TEXT HERE'; color: #000; pointer-events: none; }
#tl2:empty::before { content: 'ADD TEXT HERE'; color: #000; pointer-events: none; }
#tl3:empty::before { content: 'ADD TEXT HERE'; color: #000; pointer-events: none; }
#tl4:empty::before { content: 'ADD TEXT HERE'; color: #000; pointer-events: none; }

#tl1 {
  font: bold clamp(10px, 2vw, 15px)/1.1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  text-transform: uppercase;
  letter-spacing: 0;
}

#tl2 {
  font: 600 clamp(12px, 2.5vw, 24px)/1.1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
}

#tl3, #tl4 {
  font: normal clamp(9px, 1.5vw, 12px)/1.1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
}

/* ── Controls below canvas ── */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 16px;
}

.btn {
  background: none;
  color: #000;
  border: none;
  padding: 12px 16px;
  font: bold 12px/1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  letter-spacing: 0;
  cursor: pointer;
  text-transform: uppercase;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { color: #555; }

/* Size slider (shown after image upload) */
#size-row {
  display: none;
  align-items: center;
  gap: 12px;
}

#size-label {
  color: #000;
  font: bold 11px/1 'Perpetua', 'Perpetua Titling MT', 'Book Antiqua', Palatino, serif;
  letter-spacing: 0;
  text-transform: uppercase;
  white-space: nowrap;
}

#size-slider {
  -webkit-appearance: none;
  appearance: none;
  width: min(160px, 55vw);
  height: 2px;
  background: rgba(0,0,0,0.15);
  outline: none;
  cursor: pointer;
}
#size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: #000;
  cursor: pointer;
}
#size-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  background: #000;
  border: none;
  cursor: pointer;
}

input[type=file] { display: none; }
</style>

<script>
const bgImg    = document.getElementById('bg-image');
const hint     = document.getElementById('img-hint');
const canvasEl = document.getElementById('canvas');
const fileInput = document.getElementById('file-input');

// ── Transform state ──
let posX = 0, posY = 0;          // pan offset in px
let scale = 1;                    // zoom scale

function updateTransform() {
  bgImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// ── Textline: focus, no Enter, max 5 visual lines total ──
const textOverlay = document.getElementById('text-overlay');
const tlIds = ['tl1','tl2','tl3','tl4'];

function enforceLineLimit(changedEl) {
  // Count total visual lines across all fields
  const lineHeight = parseFloat(getComputedStyle(changedEl).lineHeight) || 16;
  const totalLines = tlIds.reduce((sum, id) => {
    const el = document.getElementById(id);
    return sum + Math.round(el.scrollHeight / lineHeight);
  }, 0);
  if (totalLines > 5) {
    // Remove last character from the changed field
    const text = changedEl.textContent;
    changedEl.textContent = text.slice(0, -1);
    const range = document.createRange();
    range.selectNodeContents(changedEl);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

document.querySelectorAll('.textline').forEach(el => {
  el.addEventListener('click', e => { e.stopPropagation(); el.focus(); });
  // iOS: touchend triggers focus + keyboard
  el.addEventListener('touchend', e => { e.stopPropagation(); el.focus(); }, { passive: true });
  el.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
  el.addEventListener('input', () => {
    // Force uppercase
    const sel = window.getSelection();
    const offset = sel.focusOffset;
    el.textContent = el.textContent.toUpperCase();
    try {
      const range = document.createRange();
      range.setStart(el.firstChild || el, Math.min(offset, (el.firstChild||el).length||0));
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } catch(e) {}
    enforceLineLimit(el);
  });
});

// ── Image upload ──
hint.addEventListener('click', () => fileInput.click());
hint.addEventListener('touchend', e => { e.preventDefault(); fileInput.click(); }, { passive: false });

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadImage(f);
});

function loadImage(file) {
  bgImg.onload = () => {
    bgImg.style.display = 'block';
    hint.style.display = 'none';
    canvasEl.classList.add('has-image');
    document.getElementById('size-row').style.display = 'flex';
  };
  bgImg.src = URL.createObjectURL(file);
}

// ── Drag-and-drop image onto canvas ──
canvasEl.addEventListener('dragover', e => {
  e.preventDefault();
  canvasEl.classList.add('drag-over');
});
canvasEl.addEventListener('dragleave', e => {
  if (!canvasEl.contains(e.relatedTarget)) canvasEl.classList.remove('drag-over');
});
canvasEl.addEventListener('drop', e => {
  e.preventDefault();
  canvasEl.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});

// ── Pan (drag to reposition the photo) ──
let isDragging = false, startX = 0, startY = 0;

function startDrag(clientX, clientY) {
  if (!canvasEl.classList.contains('has-image')) return;
  isDragging = true;
  startX = clientX - posX;
  startY = clientY - posY;
  canvasEl.classList.add('dragging');
}

function moveDrag(clientX, clientY) {
  if (!isDragging) return;
  posX = clientX - startX;
  posY = clientY - startY;
  updateTransform();
}

function endDrag() {
  isDragging = false;
  canvasEl.classList.remove('dragging');
}

// Mouse
canvasEl.addEventListener('mousedown', e => {
  if (e.target.closest('.textline') || e.target.closest('#tl-tab')) return; // let text editing work
  startDrag(e.clientX, e.clientY);
  e.preventDefault();
});
window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
window.addEventListener('mouseup', endDrag);

// Touch (drag + pinch-to-zoom)
let lastTouchDist = null;

canvasEl.addEventListener('touchstart', e => {
  if (e.target.closest('.textline') || e.target.closest('#tl-tab')) return;
  if (e.touches.length === 1) {
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
  } else if (e.touches.length === 2) {
    endDrag();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
  }
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    if (!isDragging) return;
    const t = e.touches[0];
    moveDrag(t.clientX, t.clientY);
  } else if (e.touches.length === 2 && lastTouchDist !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    scale = Math.min(3, Math.max(0.25, scale * (dist / lastTouchDist)));
    lastTouchDist = dist;
    updateTransform();
    document.getElementById('size-slider').value = scale * 100;
  }
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastTouchDist = null;
  if (e.touches.length === 0) endDrag();
});

// ── Size slider ──
document.getElementById('size-slider').addEventListener('input', function() {
  scale = this.value / 100;
  updateTransform();
});

// ── Mouse wheel zoom (desktop) ──
canvasEl.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.95 : 1.05;
  scale = Math.min(3, Math.max(0.25, scale * delta));
  updateTransform();
  document.getElementById('size-slider').value = scale * 100;
}, { passive: false });

// ── Clear ──
function clearAll() {
  bgImg.src = '';
  bgImg.style.display = 'none';
  hint.style.display = 'flex';
  canvasEl.classList.remove('has-image', 'dragging');
  posX = 0; posY = 0; scale = 1;
  updateTransform();
  ['tl1','tl2','tl3','tl4','tl-tab'].forEach(id => document.getElementById(id).textContent = '');
  document.getElementById('size-slider').value = 100;
  document.getElementById('size-row').style.display = 'none';
  fileInput.value = '';
}

// ── Download (native canvas — no html2canvas) ──
function downloadImg() {
  const SIZE = canvasEl.offsetWidth;
  const PX = 2; // retina
  const c = document.createElement('canvas');
  c.width = SIZE * PX; c.height = SIZE * PX;
  const ctx = c.getContext('2d');
  ctx.scale(PX, PX);

  // White background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Background photo (object-fit:contain + pan + zoom)
  if (bgImg.src && bgImg.style.display !== 'none') {
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const baseScale = Math.min(SIZE / iw, SIZE / ih);
    const fw = iw * baseScale, fh = ih * baseScale;
    const ox = (SIZE - fw) / 2, oy = (SIZE - fh) / 2;
    ctx.save();
    ctx.translate(SIZE / 2 + posX, SIZE / 2 + posY);
    ctx.scale(scale, scale);
    ctx.drawImage(bgImg, -(SIZE / 2 - ox) , -(SIZE / 2 - oy), fw, fh);
    ctx.restore();
  }

  // DG overlay (transparent PNG, full canvas)
  ctx.drawImage(document.getElementById('dg-overlay'), 0, 0, SIZE, SIZE);

  // Text
  const canvasRect = canvasEl.getBoundingClientRect();
  [['tl1', true], ['tl2', false], ['tl3', false], ['tl4', false], ['tl-tab', true]].forEach(([id, upper]) => {
    const el = document.getElementById(id);
    const text = upper ? el.textContent.toUpperCase() : el.textContent;
    if (!text.trim()) return;
    const s = window.getComputedStyle(el);
    const r = el.getBoundingClientRect();
    ctx.save();
    ctx.font = `${s.fontWeight} ${s.fontSize} ${s.fontFamily}`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    try { ctx.letterSpacing = s.letterSpacing; } catch(e) {}
    ctx.fillText(text, r.left - canvasRect.left + r.width / 2, r.top - canvasRect.top + r.height / 2);
    ctx.restore();
  });

  const url = c.toDataURL();
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    // iOS Safari doesn't support programmatic download — open in new tab, user saves with long-press
    window.open(url, '_blank');
  } else {
    const a = document.createElement('a');
    a.download = 'yellow-box.png';
    a.href = url;
    a.click();
  }
}

// ── Share (upload to ImgBB → get URL) ──
const IMGBB_KEY = '8c2cc9e9139cc9c3e4df12efe407d821'; // ← replace with your ImgBB API key

document.getElementById('share-btn').style.display = '';

async function shareImg() {
  const btn = document.getElementById('share-btn');
  btn.textContent = '...';
  btn.disabled = true;

  try {
    // Render canvas same as download
    const SIZE = canvasEl.offsetWidth;
    const PX = 2;
    const c = document.createElement('canvas');
    c.width = SIZE * PX; c.height = SIZE * PX;
    const ctx = c.getContext('2d');
    ctx.scale(PX, PX);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, SIZE, SIZE);
    if (bgImg.src && bgImg.style.display !== 'none') {
      const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
      const baseScale = Math.min(SIZE / iw, SIZE / ih);
      const fw = iw * baseScale, fh = ih * baseScale;
      const ox = (SIZE - fw) / 2, oy = (SIZE - fh) / 2;
      ctx.save();
      ctx.translate(SIZE / 2 + posX, SIZE / 2 + posY);
      ctx.scale(scale, scale);
      ctx.drawImage(bgImg, -(SIZE / 2 - ox), -(SIZE / 2 - oy), fw, fh);
      ctx.restore();
    }
    ctx.drawImage(document.getElementById('dg-overlay'), 0, 0, SIZE, SIZE);
    const canvasRect = canvasEl.getBoundingClientRect();
    [['tl1',true],['tl2',false],['tl3',false],['tl4',false],['tl-tab',true]].forEach(([id,upper]) => {
      const el = document.getElementById(id);
      const text = upper ? el.textContent.toUpperCase() : el.textContent;
      if (!text.trim()) return;
      const s = window.getComputedStyle(el);
      const r = el.getBoundingClientRect();
      ctx.save();
      ctx.font = `${s.fontWeight} ${s.fontSize} ${s.fontFamily}`;
      ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, r.left - canvasRect.left + r.width / 2, r.top - canvasRect.top + r.height / 2);
      ctx.restore();
    });

    // Upload to ImgBB
    const base64 = c.toDataURL('image/jpeg', 0.9).split(',')[1];
    const form = new FormData();
    form.append('image', base64);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: form });
    const data = await res.json();
    const url = data.data.url;

    // Share or copy URL
    if (navigator.share) {
      await navigator.share({ url, title: 'Yellow Box' });
    } else {
      await navigator.clipboard.writeText(url);
      alert('Link copied!');
    }
  } catch(e) {
    alert('Upload failed. Check your ImgBB API key.');
  } finally {
    btn.textContent = 'SHARE';
    btn.disabled = false;
  }
}

// ── Enter key navigation in text lines ──
// ── Bottom tab: 7-char max ──
document.getElementById('tl-tab').addEventListener('input', function() {
  if (this.textContent.length > 7) {
    const trimmed = this.textContent.slice(0, 7);
    this.textContent = trimmed;
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(this);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});
document.getElementById('tl-tab').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
  if (this && this.textContent && this.textContent.length >= 7 && e.key.length === 1 && !e.metaKey && !e.ctrlKey) e.preventDefault();
});

document.getElementById('tl1').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('tl2').focus(); }
});
document.getElementById('tl2').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
});
</script>
